name: PHP CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ['8.3', '8.4']

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: pcov
          tools: composer:v2
          extensions: mbstring, intl, pdo_sqlite

      - name: Validate composer.json
        run: composer validate --strict

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Install PHPUnit, PHPStan and Psalm
        run: composer require --dev phpunit/phpunit:^12 phpstan/phpstan:^2 tomasvotruba/type-coverage phpstan/extension-installer 

      - name: Run PHPUnit
        run: vendor/bin/phpunit --coverage-text --coverage-clover coverage.xml

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --configuration=phpstan.neon

      - name: Upload coverage reports to Codecov 
        uses: codecov/codecov-action@v5 
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
